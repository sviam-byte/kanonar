schema_version: 1
purpose: >
  Validation contract for Kanonar character axes and derived labels. This file
  separates base vector_base axes from derived traits, and separates external
  psychometric validation from internal simulation validation.

source_paths:
  base_axis_schema: data/character-schema.ts
  derived_trait_runtime: lib/traits.ts
  metric_inventory: docs/ENTITY_AND_METRIC_INDEX.md
  behavior_lab: docs/BEHAVIOR_LAB.md
  local_spi_export: kanonar_trait_validation/

status_definitions:
  external_validatable: >
    A close real construct exists. Use convergent and discriminant validity
    against external scales or public-domain item pools.
  proxy_validatable: >
    No exact external scale is assumed, but behavior, corpus data, or task
    proxies can test the expected pattern.
  world_internal: >
    Kanonar/worldbuilding axis. Validate by deterministic scenario behavior,
    perturbation, and in-world task success, not by treating it as a real
    psychological scale.
  derived: >
    Not a base axis. Validate as a computed summary or fitted projection from
    base axes to action ratings/behavior. Split or rename if it mixes distinct
    mechanisms.

global_rules:
  - Do not validate every axis as Big Five or SPI.
  - An axis is a working simulation axis only if it changes appraisal, goals,
    choice, memory update, or world-task success.
  - A pair of axes with stable correlation above 0.8 needs a duplication review.
  - Derived traits must improve held-out action prediction over context-only and
    previous-action baselines.
  - Clinical names are forbidden unless the layer is explicitly clinical and
    validated. Prefer defensive_suspicion over paranoia.

validation_stages:
  - assign_status
  - define_nomological_map
  - diagnostic_scenario_battery
  - perturbation_tests
  - discriminant_correlation_matrix
  - external_anchor_comparison
  - predictive_validity_against_baseline
  - human_or_llm_assisted_action_ratings

external_anchor_sets:
  ipip_big_five:
    use_for:
      - openness
      - conscientiousness
      - agreeableness
      - neuroticism_reversed
      - extraversion
    local_data:
      - kanonar_trait_validation/raw_spi.csv
      - kanonar_trait_validation/spi_dictionary.csv
      - kanonar_trait_validation/spi_keys.csv
  hexaco:
    use_for:
      - honesty_humility
      - emotionality
      - extraversion
      - agreeableness
      - conscientiousness
      - openness
  schwartz_values:
    use_for:
      - security
      - benevolence
      - universalism
      - power
      - self_direction
      - stimulation
      - tradition
      - conformity
  moral_foundations:
    use_for:
      - care_harm
      - fairness
      - authority
      - loyalty
      - sanctity
  iri_empathy:
    use_for:
      - empathic_concern
      - perspective_taking
  ecr_r_attachment:
    use_for:
      - attachment_anxiety
      - attachment_avoidance
  ius:
    use_for:
      - intolerance_of_uncertainty_reversed
  bis_bas:
    use_for:
      - behavioral_inhibition
      - behavioral_activation

dataset_targets:
  spi:
    status: downloaded
    path: kanonar_trait_validation/
    use_for:
      - factor_structure_smoke_check
      - derived_trait_big_five_projection
      - discriminant_validity_first_pass
    not_for:
      - world_internal_axes
      - scene_behavior_prediction
  casino:
    status: local_behavior_lab_available
    path: kanonar_behavior_lab/
    use_for:
      - negotiation_behavior
      - reciprocity
      - fairness_proxy
      - cooldown_under_reject
      - power_sovereignty_proxy
  esconv:
    status: candidate_future_dataset
    use_for:
      - care_support
      - empathy
      - shame_reduction
      - hope_control_restoration
  social_chemistry:
    status: candidate_future_dataset
    use_for:
      - norms
      - moral_judgment
      - legitimacy
      - guilt_shame_triggers
  moral_foundations_corpus:
    status: candidate_future_dataset
    use_for:
      - moral_language_axes
      - care_fairness_authority_loyalty

