    external_constructs: [openness, stimulation, behavioral_activation]
    datasets: [spi, casino]

derived_trait_refactor_v1:
  purpose: >
    Offline validation-only split of dirty derived trait containers. These axes
    are not runtime replacements until SPI Trait Validation v2 passes review and
    a separate compatibility plan is accepted.
  runtime_policy: do_not_change_lib_traits_or_trait_atoms
  validation_runner: scripts/run_spi_trait_validation_v2.py
  output_paths:
    - kanonar_trait_validation/kanonar_trait_scores_v2.csv
    - kanonar_trait_validation/trait_correlation_matrix_v2.csv
    - kanonar_trait_validation/trait_anchor_correlations_v2.csv
    - kanonar_trait_validation/trait_validation_checks_v2.json
    - kanonar_trait_validation/trait_validation_report_v2.md
  primary_traits:
    low_care_harshness:
      replaces_part_of: harshness
      expected_effects: [low_compassion_care, irritability, lower_easy_goingness]
      negative_controls: [power_only, betrayal_only]
      external_or_proxy_anchors: [spi_compassion_reversed, spi_irritability, spi_easygoingness_reversed]
      datasets: [spi]
    punitive_harshness:
      replaces_part_of: harshness
      expected_effects: [punitive_response, authoritarian_punishment, weak_cooldown_after_provocation]
      negative_controls: [generic_low_care]
      external_or_proxy_anchors: [spi_authoritarianism, spi_irritability, spi_selfcontrol_reversed]
      datasets: [spi, casino]
    power_harshness:
      replaces_part_of: harshness
      expected_effects: [coercive_power_move, status_pressure, low_autonomy_cost_concern]
      negative_controls: [suspicion, anxiety]
      external_or_proxy_anchors: [spi_authoritarianism, spi_charisma, spi_anxiety_reversed]
      datasets: [spi, casino]
    defensive_harshness:
      replaces_part_of: harshness
      expected_effects: [threat_reactive_harsh_response, retaliatory_irritability, low_cooldown]
      negative_controls: [dominance_only]
      external_or_proxy_anchors: [spi_irritability, spi_anxiety, spi_impulsivity]
      datasets: [spi, casino]
    proceduralism:
      replaces_part_of: submission
      expected_effects: [procedure_following, order_preference, conformity_with_autonomy_intact]
      negative_controls: [low_autonomy_submission]
      external_or_proxy_anchors: [spi_conformity, spi_order, spi_selfcontrol]
      datasets: [spi, social_chemistry]
    authority_deference:
      replaces_part_of: submission
      expected_effects: [authority_deference, tradition_alignment, lower_autonomy]
      negative_controls: [coalitional_loyalty]
      external_or_proxy_anchors: [spi_authoritarianism, spi_conservatism, spi_sensationseeking_reversed]
      datasets: [spi, social_chemistry]
    coalitional_loyalty:
      replaces_part_of: submission
      expected_effects: [ingroup_support, coalition_cost_absorption, trust_within_group]
      negative_controls: [proceduralism]
      external_or_proxy_anchors: [spi_agreeableness, spi_trust, spi_conformity]
      datasets: [spi, social_chemistry]
    low_autonomy_submission:
      replaces_part_of: submission
      expected_effects: [low_autonomy, low_narrative_agency, constraint_deference]
      negative_controls: [proceduralism]
      external_or_proxy_anchors: [spi_sensationseeking_reversed, spi_openness_reversed, spi_industry_reversed]
      datasets: [spi]
    defensive_suspicion:
      replaces_part_of: paranoia
      expected_effects: [low_trust, secrecy_orientation, threat_bias, betrayal_exposure_sensitivity]
      negative_controls: [clinical_paranoia, dominance_only]
      source_components:
        - C_betrayal_cost
        - A_Transparency_Secrecy
        - C_reputation_sensitivity
        - spi_proxy_trust_bias
        - spi_proxy_threat_bias
        - spi_proxy_betrayal_exposure
      external_or_proxy_anchors: [spi_trust_reversed, spi_honesty_reversed, spi_anxiety]
      datasets: [spi, casino]
    affective_stability:
      replaces_part_of: stability
      expected_effects: [emotional_stability, low_anxiety, wellbeing]
      negative_controls: [goal_coherence]
      external_or_proxy_anchors: [spi_emotionalstability, spi_neuroticism_reversed, spi_anxiety_reversed]
      datasets: [spi]
    goal_stability:
      replaces_part_of: stability
      expected_effects: [goal_coherence, plan_persistence, industry]
      negative_controls: [affective_calm]
      external_or_proxy_anchors: [spi_industry, spi_selfcontrol, spi_perfectionism]
      datasets: [spi, casino]
    cooldown_stability:
      replaces_part_of: stability
      expected_effects: [impulse_control, cooldown_discipline, lower_sensation_seeking]
      negative_controls: [tradition_order]
      external_or_proxy_anchors: [spi_impulsivity_reversed, spi_selfcontrol, spi_sensationseeking_reversed]
      datasets: [spi, casino]
    identity_stability:
