    should_not_predict: [generic_religiosity, big_five_openness]
    datasets: []
    tests: [causal_break_scenarios, topology_repair_scenarios]
  A_Memory_Fidelity:
    layer: base_value
    validation_status: proxy_validatable
    external_constructs: [memory_accuracy_proxy, witness_reliability_proxy]
    should_predict: [evidence_retention, low_report_drift]
    should_not_predict: [moral_goodness, loyalty]
    datasets: [social_chemistry]
    tests: [witness_recall_scenarios]
  A_Reversibility:
