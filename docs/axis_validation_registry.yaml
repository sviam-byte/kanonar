    status_note: rename_nonclinical
    should_predict: [defensive_interpretation, secrecy_choice_after_ambiguous_signal]
    should_not_predict: [anxiety_only, low_trust_only, secrecy_only]
    split_recommendation:
      - defensive_suspicion
      - betrayal_sensitivity
      - secrecy_orientation
      - threat_bias
    external_constructs: [trust_bias_reversed, attachment_anxiety_proxy]
    datasets: [casino, esconv]
  stability:
    layer: derived
    validation_status: derived
    recommended_name: stability_family
    current_formula_path: lib/traits.ts
    status_note: too_broad
    should_predict: [stable_behavior_when_subtype_defined]
    should_not_predict: [all_forms_of_stability_as_one_score]
    split_recommendation:
      - goal_stability
      - affective_stability
      - cooldown_stability
      - identity_stability
    external_constructs: [conscientiousness, neuroticism_reversed]
    datasets: [spi]
