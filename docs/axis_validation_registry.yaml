    layer: derived
    validation_status: derived
    recommended_name: care_orientation
    current_formula_path: lib/traits.ts
    status_note: usable_first_pass
    should_predict: [care_action_under_cost, harm_avoidance, support_strategy]
    should_not_predict: [submission, low_agency]
    split_recommendation: []
    external_constructs: [moral_foundations_care_harm, iri_empathic_concern]
    datasets: [spi, esconv, social_chemistry]
  harshness:
    layer: derived
    validation_status: derived
    recommended_name: harshness_family
    current_formula_path: lib/traits.ts
    status_note: dirty_mixed_trait
    should_predict: [punitive_action, coercive_response]
    should_not_predict: [low_care_only, power_only, betrayal_cost_only]
    split_recommendation:
      - low_care_harshness
      - punitive_harshness
      - power_harshness
      - defensive_harshness
    external_constructs: []
    datasets: [casino, social_chemistry]
  agency:
    layer: derived
    validation_status: derived
    recommended_name: action_agency
    current_formula_path: lib/traits.ts
    status_note: self_action_capacity_not_narrow_personality_trait
    should_predict: [initiative, goal_persistence, resistance_to_helplessness]
    should_not_predict: [dominance, power]
    split_recommendation: []
    external_constructs: [agency_belief, self_direction]
    datasets: [casino]
  submission:
    layer: derived
    validation_status: derived
    recommended_name: remove_or_split_submission
    current_formula_path: lib/traits.ts
    status_note: dirty_mixed_trait
    should_predict: [authority_deference_when_specific]
    should_not_predict: [proceduralism, coalition_loyalty, low_autonomy_as_one_blob]
    split_recommendation:
      - proceduralism
      - coalitional_loyalty
      - low_autonomy_submission
      - authority_deference
    external_constructs: [authority_deference]
    datasets: [social_chemistry]
  trust:
